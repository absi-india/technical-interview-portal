name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build
        env:
          AUTH_SECRET: ci-build-secret-not-used-in-production
          DATABASE_URL: file:./dev.db
          NEXTAUTH_URL: http://localhost:3000
          GEMINI_API_KEY: ci-placeholder
          CRON_SECRET: ci-placeholder

  validate-config:
    name: Pre-merge Config Gate
    runs-on: ubuntu-latest
    needs: build
    # Only enforce on PRs targeting main — don't block regular feature pushes
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v4

      - name: Ensure prisma migrate deploy is not in build script
        run: |
          if grep -q '"build".*prisma migrate deploy' package.json; then
            echo "❌ build script contains 'prisma migrate deploy' which breaks Vercel builds."
            echo "   Use 'npm run db:migrate' separately after deployment."
            exit 1
          fi
          echo "✅ Build script is clean"

      - name: Ensure .env files are not committed
        run: |
          if git ls-files | grep -qE '^\.env(\.|$)'; then
            echo "❌ A .env file is tracked by git — remove it and add to .gitignore"
            exit 1
          fi
          echo "✅ No .env files committed"

      - name: Health endpoint present
        run: |
          [ -f "src/app/api/health/route.ts" ] && echo "✅ Health endpoint present" \
            || (echo "❌ Missing src/app/api/health/route.ts" && exit 1)

      - name: Check deprecated NEXTAUTH_SECRET is not set as env key
        run: |
          if grep -rP "^\s+NEXTAUTH_SECRET:" .github/workflows/ --include="*.yml" -q; then
            echo "❌ Workflow sets NEXTAUTH_SECRET — update to AUTH_SECRET (next-auth v5)"
            exit 1
          fi
          echo "✅ AUTH_SECRET used correctly"
